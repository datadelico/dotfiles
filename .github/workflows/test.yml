# =============================================================================
# .github/workflows/test.yml — Run unit and smoke tests
#
# Runs BATS unit tests and the smoke test script on the host runner (not
# inside Docker). Used for fast feedback on pull requests.
# =============================================================================

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: BATS unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats stow

      - name: Run unit tests
        run: bats --recursive tests/unit

  smoke:
    name: Smoke test (binaries)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          submodules: recursive

      - name: Install core apt packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential curl file fontconfig git gnupg iproute2 \
            unzip wget tar jq bash-completion openssh-client htop btop \
            stow fzf zoxide eza bat fd-find ripgrep tmux shellcheck shfmt

      - name: Install external binaries
        run: |
          SKIP_GUI=1 bash install/02-binaries.sh

      - name: Add ~/.local/bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Remove default shell dotfiles (prevents Stow conflicts)
        run: |
          rm -f ~/.bashrc ~/.bash_profile ~/.bash_logout ~/.profile ~/.inputrc

      - name: Apply dotfiles with GNU Stow
        run: |
          bash install/04-stow.sh

      - name: Run smoke tests
        run: bash tests/smoke/smoke.sh

# =============================================================================
# .github/workflows/lint.yml — Lint all shell scripts and Markdown files
#
# Runs on every push and pull request.
# Validates: ShellCheck, shfmt, markdownlint-cli2
# =============================================================================

name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          submodules: recursive

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: "."
          ignore_paths: >-
            tests/bats/test_helper
            node_modules

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          submodules: recursive

      - name: Setup shfmt
        uses: mfinelli/setup-shfmt@v4

      - name: Check shell script formatting
        run: |
          find . \
            -name "*.sh" \
            -not -path "*/tests/bats/test_helper/*" \
            -not -path "*/.git/*" \
            -not -path "*/node_modules/*" \
            -print0 \
            | xargs -0 shfmt -d -i 4 -ci

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !tests/bats/**
            !node_modules/**

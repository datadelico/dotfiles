# =============================================================================
# .github/workflows/build.yml — Build and push the Docker test image
#
# Builds the docker/Dockerfile image on every push to main and on pull
# requests. Does not push to a registry — image is built as a CI artifact.
# =============================================================================

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: dotfiles-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

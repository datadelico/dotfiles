# =============================================================================
# tmux configuration (~/.config/tmux/tmux.conf)
#
# Requires tmux >= 3.2 for XDG_CONFIG_HOME support.
# Managed by GNU Stow (dotfiles/tmux/).
#
# Key bindings prefix: Ctrl+a (remapped from Ctrl+b)
# Plugin manager: TPM (Tmux Plugin Manager)
#   Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm
#   Install plugins: prefix + I
# =============================================================================

# ---------------------------------------------------------------------------
# General settings
# ---------------------------------------------------------------------------
set -g default-shell /bin/bash
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true color support
set -ga terminal-overrides ",alacritty:Tc"

set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g mouse on

# Start windows and panes at index 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reduce escape time for neovim / fast key sequences
set -sg escape-time 10

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ---------------------------------------------------------------------------
# Prefix — Ctrl+a (ergonomic alternative to Ctrl+b)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------------

# Reload config
bind r source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf" \; display-message "Config reloaded."

# Split panes — use current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window — use current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation — Vim-style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n M-Left  previous-window
bind -n M-Right next-window
bind -n M-H     previous-window
bind -n M-L     next-window

# Quick session switching
bind s choose-session
bind S new-session

# Copy mode — Vi keys
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80

# Colors — Dracula-inspired
bg_dark="#282a36"
bg_light="#44475a"
fg_white="#f8f8f2"
fg_cyan="#8be9fd"
fg_green="#50fa7b"
fg_yellow="#f1fa8c"
fg_purple="#bd93f9"
fg_orange="#ffb86c"
fg_red="#ff5555"

set -g status-style "bg=${bg_dark},fg=${fg_white}"

set -g status-left "#[bg=${fg_purple},fg=${bg_dark},bold] #S #[bg=${bg_dark},fg=${fg_purple}]"

set -g status-right "\
#[fg=${fg_cyan}]#[bg=${fg_cyan},fg=${bg_dark}]  #{pane_current_path} \
#[bg=${bg_dark},fg=${fg_green}]#[bg=${fg_green},fg=${bg_dark},bold] %H:%M \
#[bg=${bg_dark},fg=${fg_orange}]#[bg=${fg_orange},fg=${bg_dark},bold] %d %b "

setw -g window-status-format "#[fg=${bg_light}] #[bg=${bg_light},fg=${fg_white}] #I: #W #[bg=${bg_dark},fg=${bg_light}]"
setw -g window-status-current-format "#[fg=${fg_purple}]#[bg=${fg_purple},fg=${bg_dark},bold] #I: #W #[bg=${bg_dark},fg=${fg_purple}]"

setw -g window-status-activity-style "bg=${bg_dark},fg=${fg_yellow}"

# Pane borders
set -g pane-border-style "fg=${bg_light}"
set -g pane-active-border-style "fg=${fg_purple}"
set -g pane-border-status off

# Message style
set -g message-style "bg=${fg_yellow},fg=${bg_dark},bold"
set -g message-command-style "bg=${fg_yellow},fg=${bg_dark}"

# ---------------------------------------------------------------------------
# TPM — Tmux Plugin Manager
# Plugin directory: ~/.local/share/tmux/plugins/
# Install plugins: prefix + I
# Update plugins:  prefix + U
# Remove plugins:  prefix + alt+u
# ---------------------------------------------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${HOME}/.local/share/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect / continuum settings
set -g @resurrect-dir "${HOME}/.local/share/tmux/resurrect"
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM — must be the last line
if "test -f ${HOME}/.local/share/tmux/plugins/tpm/tpm" \
   "run '${HOME}/.local/share/tmux/plugins/tpm/tpm'"
